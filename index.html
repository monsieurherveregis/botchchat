<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BotchChat MVP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #e94560; }

      padding: 15px 30px;
      background: #16213e;
      border-radius: 10px;
      min-width: 300px;
      text-align: center;
    }
    button {
      padding: 18px 50px;
      font-size: 1.2rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }
    #btnAppeler {
      background: #e94560;
      color: white;
    }
    #btnAppeler:hover { background: #c73652; transform: scale(1.05); }
    #btnSuivant {
      background: #0f3460;
      color: white;
      margin-top: 15px;
      display: none;
    }
    #btnSuivant:hover { background: #1a5276; }
    .boutons { display: flex; flex-direction: column; align-items: center; }

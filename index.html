<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BotchChat MVP</title>
  <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #e94560; }
    p { color: #aaa; margin-bottom: 40px; }
    #status {
      font-size: 1.2rem;
      margin-bottom: 30px;
      padding: 15px 30px;
      background: #16213e;
      border-radius: 10px;
      min-width: 300px;
      text-align: center;
    }
    button {
      padding: 18px 50px;
      font-size: 1.2rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }
    #btnAppeler { background: #e94560; color: white; }
    #btnAppeler:hover { background: #c73652; transform: scale(1.05); }
    #btnSuivant {
      background: #0f3460;
      color: white;
      margin-top: 15px;
      display: none;
    }
    .boutons { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
  <h1>🐱 BotchChat</h1>
  <p>Parle à un inconnu. Anonymement.</p>
  <div id="status">Prêt à appeler</div>
  <div class="boutons">
    <button id="btnAppeler" onclick="appeler()">📞 Appeler</button>
    <button id="btnSuivant" onclick="suivant()">⏭ Suivant</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://ifpjrtyeokwkgcecvqrd.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmcGpydHllb2t3a2djZWN2cXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDc2NjQsImV4cCI6MjA5NDg4MzY2NH0.t5S0Pz-_FFNRs-W_lwG5P479ZZ9-5QZXVTIFGOH_tE8'
    const FONCTION_URL = SUPABASE_URL + '/functions/v1/matchmaking'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    let room = null
    let monUserId = null
    let abonnement = null

    function setStatus(msg) {
      document.getElementById('status').innerText = msg
    }

    async function appeler() {
      setStatus('🔍 Recherche d\'un inconnu...')
      document.getElementById('btnAppeler').style.display = 'none'
      document.getElementById('btnSuivant').style.display = 'block'

      const res = await fetch(FONCTION_URL, { method: 'POST' })
      const data = await res.json()

      if (data.matched) {
        await rejoindreRoom(data.token, data.room, data.livekit_url)
      } else {
        monUserId = data.user_id
        // Écoute si quelqu'un te rejoint
        abonnement = db
          .channel('connexions')
          .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'connexions',
            filter: `user_id=eq.${monUserId}`
          }, async (payload) => {
            await rejoindreRoom(payload.new.token, payload.new.room, null)
          })
          .subscribe()
      }
    }

    async function rejoindreRoom(token, roomName, livekitUrl) {
      setStatus('✅ Connecté ! Parlez...')
      if (abonnement) { db.removeChannel(abonnement); abonnement = null }

      room = new LivekitClient.Room()
      const url = livekitUrl || 'wss://botch-chat-sq51quce.livekit.cloud'

      await room.connect(url, token)
      await room.localParticipant.setMicrophoneEnabled(true)

      room.on('disconnected', () => setStatus('Déconnecté'))
    }

    async function suivant() {
      if (room) { await room.disconnect(); room = null }
      if (abonnement) { db.removeChannel(abonnement); abonnement = null }
      if (monUserId) {
        await db.from('file_attente').delete().eq('user_id', monUserId)
        monUserId = null
      }
      setStatus('Prêt à appeler')
      document.getElementById('btnAppeler').style.display = 'block'
      document.getElementById('btnSuivant').style.display = 'none'
    }
  </script>
</body>
</html>
